# Deployer — запускается на VPS
# Принимает webhook с docker-compose.yml → pull → up
# Переписан на Go (без Node.js зависимостей)

services:
  deployer:
    build: ./deployer
    container_name: deployer
    ports:
      - "9090:9090"
    environment:
      - DEPLOY_TOKEN=${DEPLOY_TOKEN:?Set DEPLOY_TOKEN}
      - GHCR_TOKEN=${GHCR_TOKEN:?Set GHCR_TOKEN}
      # Опционально: Telegram webhook для уведомлений
      # - LOG_WEBHOOK=https://api.telegram.org/bot<token>/sendMessage?chat_id=<chat_id>
    command: >
      -port=9090
      -token=${DEPLOY_TOKEN}
      -projects-dir=/opt/projects
      -ghcr-token=${GHCR_TOKEN}
      ${LOG_WEBHOOK:+-log-webhook=${LOG_WEBHOOK}}
    volumes:
      # Docker socket — deployer управляет контейнерами
      - /var/run/docker.sock:/var/run/docker.sock
      # Docker CLI plugins (compose)
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
      # Проекты хранятся на host
      - /opt/projects:/opt/projects
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
