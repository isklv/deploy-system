# Deployer — запускается на VPS
# Принимает webhook с docker-compose.yml → docker login → pull → up

services:
  deployer:
    build: ./deployer
    container_name: deployer
    ports:
      - "9090:9090"
    environment:
      # Токен для авторизации webhook (обязательно измени!)
      - DEPLOY_TOKEN=${DEPLOY_TOKEN:?Set DEPLOY_TOKEN}
      # PAT для pull из GHCR (read:packages)
      - GHCR_TOKEN=${GHCR_TOKEN:?Set GHCR_TOKEN}
      # Куда класть проекты
      - PROJECTS_DIR=/opt/projects
      # Опционально: Telegram webhook для уведомлений
      # - LOG_WEBHOOK=https://api.telegram.org/bot<token>/sendMessage?chat_id=<chat_id>
    volumes:
      # Docker socket — deployer управляет контейнерами
      - /var/run/docker.sock:/var/run/docker.sock
      # Проекты хранятся на host
      - /opt/projects:/opt/projects
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
